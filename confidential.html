<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confidential Dossier</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050816;
color:white;
font-family:Courier New,monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

}

.container{

width:90%;
max-width:700px;
padding:30px;
border:2px solid #39b9ff;
border-radius:12px;
background:#09122b;
animation:fadeIn 1s;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h1{

text-align:center;
color:#39b9ff;
margin-bottom:25px;
letter-spacing:2px;

}

hr{

border:1px solid #39b9ff;
margin-bottom:25px;

}

p{

margin:14px 0;
font-size:18px;

}

.next{

margin-top:35px;
text-align:center;

}

button{

padding:12px 35px;
font-size:18px;
background:#39b9ff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}

button:hover{

background:#62d0ff;

}

</style>

</head>

<body>

<div class="container">

<h1>🔒 CONFIDENTIAL DOSSIER</h1>

<hr>

<p><b>Subject:</b> Sir G</p>

<p><b>Status:</b> Mr. Kharoos</p>

<p><b>Occupation:</b> Professional Poet</p>

<p><b>Threat Level:</b> Medium</p>

<p><b>Weakness:</b> Gets annoyed when called "Mr. Kharoos".</p>

<p><b>Current Mission:</b> Have the happiest birthday ever. 🎂</p>

<p><b>File Status:</b> VERIFIED ✅</p>

<div class="next">

<button onclick="window.location.href='error.html'">

NEXT →

</button>

</div>

</div>

</body>
  </html>
