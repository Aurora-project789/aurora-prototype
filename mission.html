<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mission Unforgettable</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(180deg,#02050d,#07142d,#0d2044);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:white;

}

.glow{

position:absolute;

width:430px;

height:430px;

background:#00c6ff22;

border-radius:50%;

filter:blur(120px);

top:-160px;

left:-120px;

z-index:-1;

}

.glow2{

position:absolute;

width:360px;

height:360px;

background:#ffd54f18;

border-radius:50%;

filter:blur(110px);

bottom:-120px;

right:-120px;

z-index:-1;

}

.container{

width:92%;

max-width:900px;

text-align:center;

padding:40px;

animation:fade 1s ease;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

h1{

font-size:56px;

color:#FFD54F;

letter-spacing:3px;

margin-bottom:25px;

text-shadow:0 0 18px rgba(255,213,79,.35);

}

#story{

font-size:24px;

line-height:2;

min-height:320px;

color:#FFFFFF;

}

button{

margin-top:35px;

padding:16px 45px;

font-size:22px;

font-weight:600;

border:none;

border-radius:50px;

background:linear-gradient(90deg,#00C6FF,#3AAEFF);

color:white;

cursor:pointer;

transition:.3s;

box-shadow:0 0 20px rgba(0,198,255,.35);

display:none;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 0 35px rgba(0,198,255,.6);

}

.highlight{

color:#FFE66D;

font-weight:700;

}

</style>

</head>

<body>

<div class="glow"></div>

<div class="glow2"></div>

<div class="container">

<h1>MISSION UNFORGETTABLE</h1>

<div id="story"></div>

<button

id="nextBtn"

onclick="window.location.href='achievement.html'">

OPEN ACHIEVEMENT VAULT →

</button>

<script>

const mission=[

"🛰️ Secure connection established.",

"📁 Birthday files successfully recovered.",

"🎯 Your next mission is simple...",

"😊 Make Sir G smile today.",

"💙 Remind him how important he is.",

"🎂 Celebrate this special day together.",

"<span class='highlight'>Mission Status : READY</span>"

];

let i=0;

function typeMission(){

if(i<mission.length){

document.getElementById("story").innerHTML+=

mission[i]+"<br><br>";

i++;

setTimeout(typeMission,1100);

}else{

document.getElementById("nextBtn").style.display="inline-block";

}

}

typeMission();

</script>

<footer

style="

position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%);

font-size:15px;

color:#8fb9d8;

letter-spacing:1px;

opacity:.85;

">

MISSION STATUS • ACTIVE

</footer>

</div>

</body>

  </html>
