<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Achievement Vault</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050816;
font-family:Courier New,monospace;
color:white;
padding:30px;
}

h1{
text-align:center;
color:#39b9ff;
margin-bottom:35px;
letter-spacing:3px;
}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}

.card{

background:#09122b;
border:2px solid #39b9ff;
border-radius:12px;
padding:20px;
text-align:center;
transition:.3s;

}

.card:hover{

transform:scale(1.05);

}

h2{

color:#39b9ff;
margin-bottom:15px;

}

p{

line-height:1.7;

}

button{

display:block;
margin:40px auto;
padding:12px 35px;
font-size:18px;
font-weight:bold;
background:#39b9ff;
border:none;
border-radius:8px;
cursor:pointer;

}

button:hover{

background:#63d1ff;

}

</style>

</head>

<body>

<h1>🏆 ACHIEVEMENT VAULT</h1>

<div class="grid">

<div class="card">
<h2>🏆 Kharoos Award</h2>
<p>[Write why he deserves this 😆]</p>
</div>

<div class="card">
<h2>🏆 Best Person</h2>
<p>[Write your text]</p>
</div>

<div class="card">
<h2>🏆 Mr. Shayar</h2>
<p>[Write your text]</p>
</div>

<div class="card">
<h2>🏆 Best Friend Ever</h2>
<p>[Write your text]</p>
</div>

<div class="card">
<h2>🏆 Certified Flirty</h2>
<p>[Write your text 😂]</p>
</div>

</div>

<button
onclick="window.location.href='letter.html'">
NEXT →
</button>

</body>
</html>
