<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Prototype</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#02040b;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#terminal{
    width:90%;
    max-width:700px;
}

.line{
    opacity:0;
    margin:12px 0;
    font-size:20px;
    color:#8ed8ff;
}

.cursor{
    display:inline-block;
    width:10px;
    background:#8ed8ff;
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

.hidden{
    display:none;
}

#passwordBox{
    text-align:center;
}

input{
    background:black;
    border:2px solid #3aa6ff;
    color:white;
    padding:12px;
    font-size:20px;
    width:220px;
    text-align:center;
    border-radius:8px;
    outline:none;
    font-family:'Orbitron',sans-serif;
}

button{
    margin-top:20px;
    padding:12px 28px;
    background:#1479ff;
    border:none;
    color:white;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    font-family:'Poppins',sans-serif;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#loading{
    display:none;
    text-align:center;
    font-size:24px;
}

#stars{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#02040b;
    overflow:hidden;
}

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:.2;
    }
    to{
        opacity:1;
    }
}

#message{
    position:absolute;
    top:45%;
    width:100%;
    text-align:center;
    font-size:28px;
    font-family:'Poppins',sans-serif;
    display:none;
}

#begin{
    display:none;
    position:absolute;
    top:60%;
    left:50%;
    transform:translateX(-50%);
}

    </style>
    </head>

<body>

<div id="terminal">

<div class="line" id="l1">█ Initializing...</div>

<div class="line" id="l2">█ Establishing connection...</div>

<div class="line" id="l3">█ Scanning recipient...</div>

<div class="line" id="l4">█ Recipient found.</div>

<div class="line" id="l5">█ Identity verification required.</div>

</div>

<div id="passwordBox" class="hidden">

<h2 style="margin-bottom:25px;">MISSION: UNEXPECTED</h2>

<input
type="password"
id="pass"
placeholder="Access Code">

<br>

<button onclick="checkPassword()">

UNLOCK

</button>

</div>

<div id="loading">

<div id="loadText">

Loading...

</div>

</div>

<div id="stars">

<div id="message">

Some stories begin when you least expect them.

</div>

<button id="begin">

Begin the Unexpected

</button>

</div>
<script>

const lines = [
"> SYSTEM BOOTING...",
"> Establishing Secure Connection...",
"> Identity Confirmed.",
"> Accessing Mission Database...",
"> Welcome, Agent."
];

let i=0;

function showLines(){

if(i<lines.length){

document.getElementById(lines[i]).style.opacity=1;

i++;

setTimeout(showLines,900);

}
else{

setTimeout(()=>{

document.getElementById("terminal").style.display="none";

document.getElementById("passwordBox").classList.remove("hidden");

},800);

}

}

window.onload=showLines;

function checkPassword(){

let pass=document.getElementById("pass").value;

if(pass==="2206"){

document.getElementById("passwordBox").style.display="none";

document.getElementById("loading").style.display="block";

startLoading();

}

else{

alert("Wrong Password");

}

}

function startLoading(){

const steps=[10,32,68,99];

let x=0;

const text=document.getElementById("loadText");

const timer=setInterval(()=>{

if(x<steps.length){

text.innerHTML=steps[x]+"%";

x++;

}

else{

clearInterval(timer);

text.innerHTML="Still 99%<br><br>(Just like your replies 😄)";
    setTimeout(()=>{

text.innerHTML="100%";

setTimeout(()=>{

document.getElementById("loading").style.display="none";

document.getElementById("stars").style.display="block";

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.className="star";

star.style.width=Math.random()*3+1+"px";

star.style.height=star.style.width;

star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*100+"%";

star.style.animationDelay=Math.random()*3+"s";

document.getElementById("stars").appendChild(star);

}

document.getElementById("message").style.display="block";

setTimeout(()=>{

document.getElementById("begin").style.display="block";

},2000);

},1200);

},2000);

}

},1200);

}

</script>

</body>

</html>
