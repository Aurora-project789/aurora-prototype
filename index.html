<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mission Unforgettable</title>

<style>
  
/* PASSWORD SCREEN */

#passwordScreen{
display:none;
width:90%;
max-width:600px;
text-align:center;
animation:fadeIn 1s;
}

#passwordScreen h2{
color:#39b9ff;
margin-bottom:20px;
letter-spacing:2px;
}

#passwordInput{
width:220px;
padding:12px;
font-size:20px;
text-align:center;
background:#111;
border:2px solid #39b9ff;
color:white;
border-radius:8px;
outline:none;
margin-top:20px;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
background:#39b9ff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#5cc8ff;
}

#result{
margin-top:20px;
font-size:20px;
color:white;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

  }
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050816;
color:#6bd6ff;
font-family:Courier New, monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:90%;
max-width:600px;
text-align:center;
}

h1{
font-size:34px;
margin-bottom:25px;
letter-spacing:3px;
}

#status{
font-size:18px;
margin-bottom:25px;
color:white;
}

.bar{
width:100%;
height:22px;
background:#1d1d1d;
border-radius:30px;
overflow:hidden;
}

#progress{
width:0%;
height:100%;
background:#39b9ff;
transition:width .5s;
}

#percent{
margin-top:20px;
font-size:28px;
}

#joke{
margin-top:20px;
font-size:18px;
color:#7ddcff;
}

</style>

</head>

<body>

<div class="container">

<h1>AURORA SYSTEM</h1>

<div id="status">
Preparing Birthday Surprise...
</div>

<div class="bar">
<div id="progress"></div>
</div>

<div id="percent">0%</div>

<div id="joke"></div>

</div>
  
<div id="passwordScreen">

<h2>RESTRICTED ACCESS</h2>

<p>Enter Access Code</p>

<input
type="password"
id="passwordInput"
placeholder="2206">

<br>

<button onclick="checkPassword()">
UNLOCK
</button>

<div id="result"></div>

</div>
  
<script>

let steps=[5,16,29,43,58,71,84,95,99,100];

let i=0;

function loading(){

let value=steps[i];

document.getElementById("progress").style.width=value+"%";

document.getElementById("percent").innerHTML=value+"%";

if(value==99){

document.getElementById("joke").innerHTML=
"Still 99%...<br>Just like your late replies. 😂";

setTimeout(()=>{
i++;
loading();
},4000);

return;

}

if(value==100){

document.getElementById("status").innerHTML=
"Connection Established ✔";

document.getElementById("joke").innerHTML=
"Accessing Restricted Birthday Files...";

setTimeout(function(){

document.querySelector(".container").style.display="none";

document.getElementById("passwordScreen").style.display="block";

},2000);

return;

  }

}

i++;

setTimeout(loading,700);

}

loading();
function checkPassword(){

let password=
document.getElementById("passwordInput").value;

if(password=="2206"){

document.getElementById("result").innerHTML=
"✅ ACCESS GRANTED";

}else{

document.getElementById("result").innerHTML=
"❌ ACCESS DENIED";

}

  }
  
</script>

</body>
  </html>
