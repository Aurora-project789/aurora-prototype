<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Letter</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(180deg,#06142b,#0b2247);

font-family:Courier New,monospace;

overflow:hidden;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

.container{

width:90%;

max-width:850px;

text-align:center;

animation:fadeIn 1.5s;

position:relative;

z-index:2;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

h1{

font-size:42px;

color:#ffe066;

margin-bottom:20px;

}

.subtitle{

font-size:20px;

color:#ffffff;

margin-bottom:35px;

}

.letter{

background:rgba(255,255,255,.08);

border:2px solid #ffffff55;

border-radius:15px;

padding:25px;

line-height:1.9;

font-size:20px;

min-height:260px;

backdrop-filter:blur(5px);

}

.placeholder{

color:#ffd54f;

font-style:italic;

}

button{

margin-top:35px;

padding:14px 35px;

font-size:18px;

font-weight:bold;

border:none;

border-radius:10px;

background:#39b9ff;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#63d1ff;

transform:scale(1.05);

}

.balloon{

position:absolute;

font-size:42px;

animation:float 8s linear infinite;

}

@keyframes float{

0%{

transform:translateY(120vh);

}

100%{

transform:translateY(-150px);

}

}

.b1{

left:10%;

animation-delay:0s;

}

.b2{

left:28%;

animation-delay:2s;

}

.b3{

left:48%;

animation-delay:1s;

}

.b4{

left:70%;

animation-delay:3s;

}

.b5{

left:88%;

animation-delay:5s;

}
}

</style>

</head>

<body>

<div class="balloon b1">🎈</div>
<div class="balloon b2">🎈</div>
<div class="balloon b3">🎈</div>
<div class="balloon b4">🎈</div>
<div class="balloon b5">🎈</div>

<div class="container">

<h1>🎂 Happy Birthday 🎂</h1>

<p class="subtitle">

One last confidential file remains...

It isn't a mission.

It isn't a secret.

It's something from the heart. 💙

</p>

<div class="letter">

🎁 Dear Sir G,

<br><br>

<span class="placeholder">

[✍ BIYA: Write your birthday letter here.]

</span>

<br><br>

🎂 Wishing you happiness, success and countless smiles.

</div>

<button onclick="window.location.href='birthday.html'">

Open Final Surprise 🎉

</button>

</div> 

<script>

// Future animation code can go here.

console.log("Birthday Letter Loaded ❤️");

</script>

</body>

  </html>
