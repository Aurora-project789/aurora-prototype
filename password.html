<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Restricted Access</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050816;

font-family:Courier New,monospace;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

color:white;

}

.container{

width:90%;

max-width:650px;

text-align:center;

animation:fadeIn 1s;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

h1{

font-size:34px;

color:#39b9ff;

letter-spacing:3px;

margin-bottom:20px;

}

p{

font-size:18px;

margin-bottom:25px;

}

input{

width:240px;

padding:12px;

background:#111;

border:2px solid #39b9ff;

border-radius:8px;

color:white;

font-size:20px;

text-align:center;

outline:none;

}

button{

margin-top:25px;

padding:12px 35px;

font-size:18px;

font-weight:bold;

background:#39b9ff;

border:none;

border-radius:8px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#5ecfff;

}

#message{

margin-top:25px;

font-size:22px;

min-height:30px;

color:#7ddcff;

}

</style>

</head>

<body>

<div class="container">

<h1>RESTRICTED ACCESS</h1>

<p>

Enter the Access Code

</p>

<input

type="password"

id="password"

placeholder="2206"

>

<br>

<button

onclick="checkPassword()"

>

UNLOCK

</button>

<div id="message"></div>

<script>
function checkPassword(){

let password=document.getElementById("password").value;

if(password==="2206"){

document.getElementById("message").innerHTML=
"✅ ACCESS GRANTED";

setTimeout(function(){

window.location.href="confidential.html";

},1500);

}else{

document.getElementById("message").innerHTML=
"❌ ACCESS DENIED";

setTimeout(function(){

document.getElementById("message").innerHTML=
"Hint: The date everyone should remember. 😉";

},1500);

}

}
</script>

</div>

</body>
</html>
