<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restricted Access</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(180deg,#030712,#071a35,#0a2447);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:white;

}

.glow{

position:absolute;

width:420px;

height:420px;

background:#1f6fff33;

border-radius:50%;

filter:blur(110px);

top:-140px;

left:-120px;

z-index:-1;

}

.glow2{

position:absolute;

width:360px;

height:360px;

background:#00c6ff22;

border-radius:50%;

filter:blur(100px);

bottom:-120px;

right:-120px;

z-index:-1;

}

.container{

width:92%;

max-width:720px;

text-align:center;

padding:40px;

animation:fade 1.2s ease;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.lock{

font-size:70px;

margin-bottom:18px;

}

h1{

font-size:52px;

color:#FFD54F;

letter-spacing:3px;

margin-bottom:15px;

text-shadow:0 0 15px rgba(255,213,79,.35);

}

.subtitle{

font-size:24px;

color:#4FC3F7;

margin-bottom:35px;

}
.inputBox{

width:100%;

max-width:280px;

padding:16px;

border:2px solid #4FC3F7;

border-radius:14px;

background:#0f1d35;

color:#FFFFFF;

font-size:28px;

font-weight:600;

text-align:center;

outline:none;

transition:.3s;

}

.inputBox:focus{

border-color:#FFD54F;

box-shadow:0 0 20px rgba(255,213,79,.35);

}

button{

margin-top:30px;

padding:16px 45px;

font-size:22px;

font-weight:600;

background:linear-gradient(90deg,#00C6FF,#3AAEFF);

color:white;

border:none;

border-radius:50px;

cursor:pointer;

transition:.3s;

box-shadow:0 0 20px rgba(0,198,255,.35);

}

button:hover{

transform:translateY(-3px);

box-shadow:0 0 35px rgba(0,198,255,.6);

}

#message{

margin-top:28px;

font-size:24px;

font-weight:600;

min-height:40px;

color:#FFE66D;

line-height:1.6;

}

.tip{

margin-top:35px;

font-size:18px;

color:#BFDFFF;

}

</style>

</head>

<body>

<div class="glow"></div>

<div class="glow2"></div>

<div class="container">

<div class="lock">🔐</div>

<h1>RESTRICTED ACCESS</h1>

<div class="subtitle">

Only authorized agents may continue.

</div>

<input

type="password"

id="password"

class="inputBox"

placeholder="Enter Access Code"

maxlength="4"

>

<br>

<button onclick="checkPassword()">

UNLOCK

</button>

<div id="message"></div>

<div class="tip">

💡 Hint: The code is a memorable date.

</div>

<script>

function checkPassword(){

const password=document.getElementById("password").value;

const message=document.getElementById("message");

if(password==="2206"){

message.style.color="#7CFF9D";

message.innerHTML="✅ ACCESS GRANTED";

setTimeout(function(){

window.location.href="confidential.html";

},1800);

}else{

message.style.color="#FF8A8A";

message.innerHTML="❌ ACCESS DENIED";

setTimeout(function(){

message.style.color="#FFE66D";

message.innerHTML="💡 Incorrect code. Try again, Agent.";

},1800);

}

}

document.getElementById("password").addEventListener("keypress",function(e){

if(e.key==="Enter"){

checkPassword();

}

});
</script>

<footer

style="

position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%);

font-size:15px;

color:#8fb9d8;

letter-spacing:1px;

opacity:.85;

">

SECURITY LEVEL • RESTRICTED ACCESS

</footer> 
  
</div>

</body>

  </html>
